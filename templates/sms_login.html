{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="mb-3 text-center">手机号验证码登录</h3>
                <div class="alert alert-info small">
                    先输入已注册手机号发送验证码，再输入短信验证码登录。
                </div>

                <form method="post" class="mb-3">
                    <input type="hidden" name="action" value="send_code">
                    <div class="mb-3">
                        <label class="form-label">手机号</label>
                        <input class="form-control" name="phone" inputmode="tel" placeholder="请输入已注册手机号" required>
                    </div>
                    <button class="btn btn-outline-primary w-100">发送验证码</button>
                </form>

                <hr>

                <form method="post">
                    <input type="hidden" name="action" value="login">
                    <div class="mb-3">
                        <label class="form-label">手机号</label>
                        <input class="form-control" name="phone" inputmode="tel" placeholder="请输入已注册手机号" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">短信验证码</label>
                        <input class="form-control" name="code" inputmode="numeric" placeholder="请输入6位验证码" required>
                    </div>
                    <button class="btn btn-primary w-100">验证码登录</button>
                </form>

                <div class="d-flex justify-content-between small mt-3">
                    <a href="{{ url_for('login') }}">密码登录</a>
                    <a href="{{ url_for('forgot_password') }}">忘记密码？</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
