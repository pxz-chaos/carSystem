{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm border-success">
            <div class="card-body p-4">
                <h3 class="text-success">出车成功</h3>
                <p>车牌号：<strong>{{ trip.plate }}</strong></p>
                <p>出发里程：{{ trip.start_mileage }} KM</p>
                <p>出发时间：{{ trip.start_time }}</p>
                <p>出发地点：{{ trip.start_address }}</p>
                {% if trip.warning %}<div class="alert alert-warning">{{ trip.warning }}</div>{% endif %}
                <a class="btn btn-primary" href="{{ url_for('dashboard') }}">返回首页</a>
                <a class="btn btn-success" href="{{ url_for('finish') }}">去回场登记</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
