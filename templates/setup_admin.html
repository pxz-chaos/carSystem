{% extends 'base.html' %}
{% block content %}
<div class="container py-4" style="max-width: 760px;">
  <h3 class="mb-3">首次设置管理员</h3>
  <p class="text-muted">
    系统不再内置默认管理员密码。首次启动或检测到旧版 admin/admin123 时，必须由你自己设置管理员账号、密码和基础资料。
  </p>

  <form method="post" class="card shadow-sm border-0">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">管理员用户名</label>
          <input class="form-control" name="username" required minlength="2" maxlength="30" autocomplete="username">
        </div>
        <div class="col-md-6">
          <label class="form-label">管理员手机号</label>
          <input class="form-control" name="phone" required pattern="1\d{10}" maxlength="11" inputmode="numeric" autocomplete="tel">
        </div>

        <div class="col-md-6">
          <label class="form-label">管理员密码</label>
          <input class="form-control" type="password" name="password" required minlength="8" autocomplete="new-password">
        </div>
        <div class="col-md-6">
          <label class="form-label">确认管理员密码</label>
          <input class="form-control" type="password" name="password2" required minlength="8" autocomplete="new-password">
        </div>

        <div class="col-md-4">
          <label class="form-label">性别</label>
          <select class="form-select" name="gender" required>
            <option value="">请选择</option>
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
        </div>
        <div class="col-md-8">
          <label class="form-label">单位</label>
          <select class="form-select js-other-select" name="unit" data-target="unit_other" required>
            <option value="">请选择</option>
            <option value="遵义供电局">遵义供电局</option>
            <option value="其他">其他</option>
          </select>
          <input class="form-control mt-2 d-none" name="unit_other" id="unit_other" placeholder="请输入单位">
        </div>

        <div class="col-md-6">
          <label class="form-label">部门</label>
          <select class="form-select js-other-select" name="department" data-target="department_other" required>
            <option value="">请选择</option>
            <option value="变电管理一所">变电管理一所</option>
            <option value="变电管理二所">变电管理二所</option>
            <option value="其他">其他</option>
          </select>
          <input class="form-control mt-2 d-none" name="department_other" id="department_other" placeholder="请输入部门">
        </div>
        <div class="col-md-6">
          <label class="form-label">班组</label>
          <select class="form-select js-other-select" name="team" data-target="team_other" required>
            <option value="">请选择</option>
            <option value="继保班">继保班</option>
            <option value="自动化班">自动化班</option>
            <option value="检修一班">检修一班</option>
            <option value="检修二班">检修二班</option>
            <option value="试验一班">试验一班</option>
            <option value="试验二班">试验二班</option>
            <option value="电源班">电源班</option>
            <option value="智能作业班">智能作业班</option>
            <option value="其他">其他</option>
          </select>
          <input class="form-control mt-2 d-none" name="team_other" id="team_other" placeholder="请输入班组">
        </div>
      </div>
    </div>
    <div class="card-footer bg-white d-flex justify-content-between align-items-center">
      <span class="text-muted small">请牢记管理员密码。管理员可以管理用户权限和导出全部司机数据。</span>
      <button class="btn btn-primary" type="submit">保存管理员账号</button>
    </div>
  </form>
</div>

<script>
document.querySelectorAll('.js-other-select').forEach(function(select) {
  const target = document.getElementById(select.dataset.target);
  function toggleOther() {
    if (!target) return;
    const enabled = select.value === '其他';
    target.classList.toggle('d-none', !enabled);
    target.required = enabled;
    if (!enabled) target.value = '';
  }
  select.addEventListener('change', toggleOther);
  toggleOther();
});
</script>
{% endblock %}
