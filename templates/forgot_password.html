{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="mb-3 text-center">邮箱找回密码</h3>

        <div class="alert alert-info small">
          使用“用户名 + 注册邮箱 + 邮箱验证码”重置密码。若启用 <code>EMAIL_PROVIDER=console</code>，验证码会写入 <code>debug_ocr/email_codes.txt</code>。
        </div>

        <form method="post" class="mb-3">
          <input type="hidden" name="action" value="send_code">
          <div class="mb-3">
            <label class="form-label">用户名</label>
            <input class="form-control" name="username" placeholder="请输入用户名" required>
          </div>
          <div class="mb-3">
            <label class="form-label">注册邮箱</label>
            <input class="form-control" name="email" type="email" placeholder="请输入注册时绑定的邮箱" required>
          </div>
          <button class="btn btn-outline-primary w-100">发送邮箱验证码</button>
        </form>

        <hr>

        <form method="post">
          <input type="hidden" name="action" value="reset">
          <div class="mb-3">
            <label class="form-label">用户名</label>
            <input class="form-control" name="username" placeholder="请输入用户名" required>
          </div>
          <div class="mb-3">
            <label class="form-label">注册邮箱</label>
            <input class="form-control" name="email" type="email" placeholder="请输入注册时绑定的邮箱" required>
          </div>
          <div class="mb-3">
            <label class="form-label">邮箱验证码</label>
            <input class="form-control" name="code" inputmode="numeric" placeholder="请输入验证码" required>
          </div>
          <div class="mb-3">
            <label class="form-label">新密码</label>
            <input class="form-control" name="password" type="password" placeholder="至少6位" required>
          </div>
          <div class="mb-3">
            <label class="form-label">确认新密码</label>
            <input class="form-control" name="password2" type="password" placeholder="再次输入新密码" required>
          </div>
          <button class="btn btn-primary w-100">重置密码</button>
        </form>

        <div class="text-center small mt-3">
          <a href="{{ url_for('login') }}">返回登录</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
