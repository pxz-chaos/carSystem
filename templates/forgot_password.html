<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>找回密码 - 车队管理系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-7 col-lg-5">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h2 class="text-center mb-3">找回密码</h2>
            <p class="text-muted text-center mb-4">请输入用户名和注册时绑定的手机号，系统会发送验证码。</p>

            <form method="post">
              <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
              </div>

              <div class="mb-3">
                <label class="form-label">手机号</label>
                <input type="tel" name="phone" class="form-control" placeholder="请输入注册时绑定的11位手机号" required>
              </div>

              <button type="submit" name="action" value="send_code" class="btn btn-outline-primary w-100 mb-3" formnovalidate>
                发送短信验证码
              </button>

              <hr>

              <div class="mb-3">
                <label class="form-label">短信验证码</label>
                <input type="text" name="code" class="form-control" placeholder="请输入短信验证码">
              </div>

              <div class="mb-3">
                <label class="form-label">新密码</label>
                <input type="password" name="password" class="form-control" placeholder="至少6位">
              </div>

              <div class="mb-3">
                <label class="form-label">确认新密码</label>
                <input type="password" name="password2" class="form-control" placeholder="再次输入新密码">
              </div>

              <button type="submit" name="action" value="reset" class="btn btn-primary w-100">
                重置密码
              </button>
            </form>

            <div class="text-center mt-3">
              <a href="{{ url_for('login') }}">返回登录</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
