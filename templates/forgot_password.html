{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8 col-xl-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="mb-3">找回密码</h3>
        <p class="text-muted mb-4">推荐使用注册时绑定的邮箱接收免费验证码；如果未绑定邮箱，可继续使用短信验证码备用。</p>

        <ul class="nav nav-tabs" id="resetTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="email-tab" data-bs-toggle="tab" data-bs-target="#email-pane" type="button" role="tab">邮箱找回</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="sms-tab" data-bs-toggle="tab" data-bs-target="#sms-pane" type="button" role="tab">短信备用</button>
          </li>
        </ul>

        <div class="tab-content pt-4">
          <div class="tab-pane fade show active" id="email-pane" role="tabpanel" aria-labelledby="email-tab">
            <form method="post" class="mb-4">
              <input type="hidden" name="action" value="send_email_code">
              <div class="mb-3">
                <label class="form-label">用户名</label>
                <input class="form-control" name="username" autocomplete="username" required>
              </div>
              <div class="mb-3">
                <label class="form-label">注册邮箱</label>
                <input class="form-control" name="email" type="email" autocomplete="email" required>
              </div>
              <button class="btn btn-outline-primary" type="submit">发送邮箱验证码</button>
            </form>

            <hr>

            <form method="post">
              <input type="hidden" name="action" value="reset_email">
              <div class="mb-3">
                <label class="form-label">用户名</label>
                <input class="form-control" name="username" autocomplete="username" required>
              </div>
              <div class="mb-3">
                <label class="form-label">注册邮箱</label>
                <input class="form-control" name="email" type="email" autocomplete="email" required>
              </div>
              <div class="mb-3">
                <label class="form-label">邮箱验证码</label>
                <input class="form-control" name="email_code" inputmode="numeric" autocomplete="one-time-code" required>
              </div>
              <div class="mb-3">
                <label class="form-label">新密码</label>
                <input class="form-control" name="password" type="password" autocomplete="new-password" required minlength="6">
              </div>
              <div class="mb-3">
                <label class="form-label">确认新密码</label>
                <input class="form-control" name="password2" type="password" autocomplete="new-password" required minlength="6">
              </div>
              <button class="btn btn-primary" type="submit">通过邮箱重置密码</button>
            </form>
          </div>

          <div class="tab-pane fade" id="sms-pane" role="tabpanel" aria-labelledby="sms-tab">
            <form method="post" class="mb-4">
              <input type="hidden" name="action" value="send_sms_code">
              <div class="mb-3">
                <label class="form-label">用户名</label>
                <input class="form-control" name="username" autocomplete="username" required>
              </div>
              <div class="mb-3">
                <label class="form-label">手机号</label>
                <input class="form-control" name="phone" inputmode="numeric" autocomplete="tel" required>
              </div>
              <button class="btn btn-outline-secondary" type="submit">发送短信验证码</button>
            </form>

            <hr>

            <form method="post">
              <input type="hidden" name="action" value="reset_sms">
              <div class="mb-3">
                <label class="form-label">用户名</label>
                <input class="form-control" name="username" autocomplete="username" required>
              </div>
              <div class="mb-3">
                <label class="form-label">手机号</label>
                <input class="form-control" name="phone" inputmode="numeric" autocomplete="tel" required>
              </div>
              <div class="mb-3">
                <label class="form-label">短信验证码</label>
                <input class="form-control" name="code" inputmode="numeric" autocomplete="one-time-code" required>
              </div>
              <div class="mb-3">
                <label class="form-label">新密码</label>
                <input class="form-control" name="password" type="password" autocomplete="new-password" required minlength="6">
              </div>
              <div class="mb-3">
                <label class="form-label">确认新密码</label>
                <input class="form-control" name="password2" type="password" autocomplete="new-password" required minlength="6">
              </div>
              <button class="btn btn-secondary" type="submit">通过短信重置密码</button>
            </form>
          </div>
        </div>

        <div class="mt-4">
          <a href="{{ url_for('login') }}">返回登录</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
