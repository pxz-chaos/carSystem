{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

        <div class="card shadow-sm">
            <div class="card-body p-4">

                <h3 class="mb-3 text-center">用户注册</h3>

                <form method="post">

                    <!-- 用户名 -->
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input class="form-control" name="username"
                               placeholder="2-30位中文、字母、数字或下划线" required>
                    </div>

                    <!-- 手机号 -->
                    <div class="mb-3">
                        <label class="form-label">手机号</label>
                        <input class="form-control" name="phone"
                               inputmode="tel" placeholder="11位手机号，用于登录和找回密码" required>
                    </div>

                    <!-- 邮箱 -->
  <div class="mb-3">
   <label class="form-label">邮箱</label>
   <input class="form-control" name="email" type="email"
          placeholder="用于免费邮箱验证码找回密码" required>
   <div class="form-text">请填写可正常接收邮件的邮箱。</div>
  </div>

  <!-- 密码 -->
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input class="form-control" name="password" type="password"
                               placeholder="至少6位" required>
                    </div>

                    <!-- 确认密码 -->
                    <div class="mb-3">
                        <label class="form-label">确认密码</label>
                        <input class="form-control" name="password2" type="password"
                               placeholder="再次输入密码" required>
                    </div>

                    <hr>

                    <!-- 性别 -->
                    <div class="mb-3">
                        <label class="form-label">性别</label>
                        <select class="form-control" name="gender">
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>

                    <!-- 单位 -->
                    <div class="mb-3">
                        <label class="form-label">单位</label>
                        <select class="form-control" name="unit"
                                onchange="toggleOther(this,'unit_other')">
                            <option value="遵义供电局">遵义供电局</option>
                            <option value="其他">其他</option>
                        </select>

                        <input class="form-control mt-2"
                               name="unit_other"
                               id="unit_other"
                               placeholder="请输入单位"
                               style="display:none;">
                    </div>

                    <!-- 部门 -->
                    <div class="mb-3">
                        <label class="form-label">部门</label>
                        <select class="form-control" name="department"
                                onchange="toggleOther(this,'dept_other')">
                            <option value="变电管理一所">变电管理一所</option>
                            <option value="变电管理二所">变电管理二所</option>
                            <option value="其他">其他</option>
                        </select>

                        <input class="form-control mt-2"
                               name="department_other"
                               id="dept_other"
                               placeholder="请输入部门"
                               style="display:none;">
                    </div>

                    <!-- 班组 -->
                    <div class="mb-3">
                        <label class="form-label">班组</label>
                        <select class="form-control" name="team"
                                onchange="toggleOther(this,'team_other')">
                            <option value="继保班">继保班</option>
                            <option value="自动化班">自动化班</option>
                            <option value="检修一班">检修一班</option>
                            <option value="检修二班">检修二班</option>
                            <option value="试验一班">试验一班</option>
                            <option value="试验二班">试验二班</option>
                            <option value="电源班">电源班</option>
                            <option value="智能作业班">智能作业班</option>
                            <option value="其他">其他</option>
                        </select>

                        <input class="form-control mt-2"
                               name="team_other"
                               id="team_other"
                               placeholder="请输入班组"
                               style="display:none;">
                    </div>

                    <!-- 提交 -->
                    <button class="btn btn-primary w-100">注册</button>

                </form>

                <div class="text-center small mt-3">
                    <a href="{{ url_for('login') }}">已有账号，返回登录</a>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- JS逻辑 -->
<script>
function toggleOther(selectObj, inputId){
    var val = selectObj.value;
    var input = document.getElementById(inputId);

    if(val === "其他"){
        input.style.display = "block";
    } else {
        input.style.display = "none";
        input.value = "";
    }
}
</script>

{% endblock %}
